apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghostfolio-base
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/base
      sourceRef:
        kind: GitRepository
        name: ghostfolio
        namespace: flux-system
  targetNamespace: ghostfolio
  install:
    createNamespace: true
  values:
    replicaCount: 1
    image:
      repository: docker.io/ghostfolio/ghostfolio
      pullPolicy: IfNotPresent
    gateway:
      enabled: true
      parentRefs:
        - name: default-gateway
      hostnames:
        - ghostfolio.example.com
    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: ghostfolio-pg-app
            key: uri
      - name: REDIS_HOST
        value: ghostfolio-redis
      - name: REDIS_PORT
        value: "6379"
    envFrom:
      - secretRef:
          name: ghostfolio
