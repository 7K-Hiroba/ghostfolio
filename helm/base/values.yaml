# Default values for Ghostfolio
# https://ghostfol.io — Open Source Wealth Management Software

replicaCount: 1

image:
  # -- Official upstream image from Docker Hub
  repository: docker.io/ghostfolio/ghostfolio
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  # -- Ghostfolio listens on port 3333 by default (configurable via PORT env var)
  targetPort: 3333

gateway:
  enabled: true
  annotations: {}
  # -- Parent Gateway references
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  # -- Hostnames to match
  hostnames:
    - ghostfolio.example.com
  # -- Routing rules (omit for a simple catch-all route to the service)
  rules: []

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# -- Ghostfolio exposes /api/v1/health for both liveness and readiness.
# Startup probe gives Prisma migrations time to complete on first boot.
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful when running more than one replica
# (replicaCount > 1 or autoscaling.enabled).
podDisruptionBudget:
  enabled: false
  # -- Exactly one of minAvailable or maxUnavailable should be set
  minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# -- Environment variables injected into the Ghostfolio container.
# At minimum you must set DATABASE_URL, REDIS_HOST, ACCESS_TOKEN_SALT,
# and JWT_SECRET_KEY. Prefer referencing a Secret created by the platform
# chart's ExternalSecret rather than inlining values here.
#
# Required env vars:
#   DATABASE_URL       — PostgreSQL connection string (from CNPG secret `uri` key)
#   REDIS_HOST         — Dragonfly/Redis service name
#   ACCESS_TOKEN_SALT  — Random salt for access tokens (from ExternalSecret)
#   JWT_SECRET_KEY     — Random key for JWT signing (from ExternalSecret)
#
# OIDC env vars (optional, enable SSO via Keycloak/Authentik/Authelia):
#   ENABLE_FEATURE_AUTH_OIDC — Set to "true" to enable OIDC
#   OIDC_ISSUER              — IdP issuer URL (e.g. https://keycloak.example.com/realms/myrealm)
#   OIDC_CLIENT_ID           — Client ID registered with the IdP
#   OIDC_CLIENT_SECRET       — Client secret (from ExternalSecret, NOT inline)
#
# Example:
#   env:
#     - name: DATABASE_URL
#       valueFrom:
#         secretKeyRef:
#           name: ghostfolio-pg-app
#           key: uri
#     - name: REDIS_HOST
#       value: ghostfolio-redis
#     - name: REDIS_PORT
#       value: "6379"
#     - name: ENABLE_FEATURE_AUTH_OIDC
#       value: "true"
#     - name: OIDC_ISSUER
#       value: https://keycloak.example.com/realms/myrealm
#     - name: OIDC_CLIENT_ID
#       value: ghostfolio
#     - name: OIDC_CLIENT_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: ghostfolio
#           key: OIDC_CLIENT_SECRET
env: []

# -- Environment variables from ConfigMap or Secret references.
# Use this to inject all keys from a Secret (e.g. one created by the platform
# chart's ExternalSecret) as environment variables.
#
# Example:
#   envFrom:
#     - secretRef:
#         name: ghostfolio
envFrom: []

# -- Extra volumes added to the pod. A /tmp emptyDir is included by default
# to satisfy readOnlyRootFilesystem while allowing Node.js and Prisma temp
# file writes.
extraVolumes:
  - name: tmp
    emptyDir: {}

# -- Extra volume mounts added to the Ghostfolio container.
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
