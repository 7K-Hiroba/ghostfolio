# Default values for Ghostfolio
# https://ghostfol.io — Open Source Wealth Management Software

replicaCount: 1

image:
  # -- Official upstream image from Docker Hub
  repository: docker.io/ghostfolio/ghostfolio
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  # -- Ghostfolio listens on port 3333 by default (configurable via PORT env var)
  targetPort: 3333

# -- Public URL of the Ghostfolio instance (ROOT_URL).
# Must be set when using OIDC — the callback URL defaults to
# ${ROOT_URL}/api/auth/oidc/callback. Also required for passkey/biometric auth.
rootUrl: ""

gateway:
  enabled: true
  annotations: {}
  # -- Parent Gateway references
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  # -- Hostnames to match
  hostnames:
    - ghostfolio.example.com
  # -- Routing rules (omit for a simple catch-all route to the service)
  rules: []

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# -- Ghostfolio exposes /api/v1/health for both liveness and readiness.
# Startup probe gives Prisma migrations time to complete on first boot.
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful when running more than one replica
# (replicaCount > 1 or autoscaling.enabled).
podDisruptionBudget:
  enabled: false
  # -- Exactly one of minAvailable or maxUnavailable should be set
  minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# -- Environment variables injected into the Ghostfolio container.
# See docs/helm-base.md for the full list of supported variables and examples.
#
# env:
#   - name: DATABASE_URL
#     valueFrom:
#       secretKeyRef:
#         name: ghostfolio-pg-app
#         key: uri
#   - name: REDIS_HOST
#     value: ghostfolio-redis
env: []

# -- Environment variables from ConfigMap or Secret references.
# See docs/helm-base.md for examples.
envFrom: []

# -- Extra volumes added to the pod. A /tmp emptyDir is included by default
# to satisfy readOnlyRootFilesystem while allowing Node.js and Prisma temp
# file writes.
extraVolumes:
  - name: tmp
    emptyDir: {}

# -- Extra volume mounts added to the Ghostfolio container.
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
