suite: CNPG ScheduledBackup
templates:
  - templates/database/cnpg-scheduled-backup.yaml
capabilities:
  apiVersions:
    - postgresql.cnpg.io/v1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
      postgres.backup.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when backup is disabled
    set:
      postgres.enabled: true
      postgres.backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when both are disabled
    set:
      postgres.enabled: false
      postgres.backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when postgres and backup are enabled
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          schedule: "0 2 * * *"
          garage:
            endpoint: "http://garage.garage.svc.cluster.local:3900"
            region: garage
            credentialsSecret:
              name: ghostfolio-pg-garage-key
              accessKeyKey: accessKey
              secretKeyKey: secretKey
    asserts:
      - isKind:
          of: ScheduledBackup
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
      - equal:
          path: metadata.name
          value: ghostfolio-pg-backup
      - equal:
          path: spec.schedule
          value: "0 2 * * *"
      - equal:
          path: spec.backupOwnerReference
          value: self
      - equal:
          path: spec.cluster.name
          value: ghostfolio-pg
      - equal:
          path: spec.pluginConfiguration.name
          value: barman-cloud.cloudnative-pg.io
      - equal:
          path: spec.pluginConfiguration.parameters.barmanObjectName
          value: ghostfolio-pg-barman

  - it: uses custom schedule
    set:
      postgres:
        enabled: true
        backup:
          enabled: true
          schedule: "0 */4 * * *"
          garage:
            endpoint: "http://garage.garage.svc.cluster.local:3900"
            region: garage
            credentialsSecret:
              name: ghostfolio-pg-garage-key
              accessKeyKey: accessKey
              secretKeyKey: secretKey
    asserts:
      - equal:
          path: spec.schedule
          value: "0 */4 * * *"
